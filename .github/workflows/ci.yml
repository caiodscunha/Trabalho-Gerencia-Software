name: CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.changes.outputs.backend }}
    steps:
      - uses: actions/checkout@v4

      - uses: dorny/paths-filter@v4
        id: changes
        with:
          filters: |
            backend:
              - 'backend/**'

  test-backend:
    needs: detect-changes
    if: needs.detect-changes.outputs.backend == 'true' || github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Instalar dependências
        run: npm ci

      - name: Executar testes
        run: npm test

      - name: Publicar resultados dos testes
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: |
            backend/junit.xml
            backend/coverage/

  deploy-backend:
    needs: test-backend
    if: github.ref == 'refs/heads/main' && github.event_name == 'push' && secrets.DEPLOY_HOOK != ''
    runs-on: ubuntu-latest
    permissions: write-all

    steps:
      - name: Deploy API
        run: |
          RESPONSE=$(curl --request GET \
            --url ${{ secrets.DEPLOY_HOOK }} \
            --header 'accept: application/json' \
            --header 'content-type: application/json')
          echo "Deploy response: $RESPONSE"
